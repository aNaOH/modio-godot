name: Rust Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows-release-x64:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build Windows Release x64
      run: cargo build --target x86_64-pc-windows-msvc --release

    - name: List files
      run: dir /s /b

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: windows-release-x64
        path: target/x86_64-pc-windows-msvc/release/mod_io.dll

  build-windows-release-x86:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build Windows Release x86
      run: cargo build --target i686-pc-windows-msvc --release

    - name: List files
      run: dir /s /b

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: windows-release-x86
        path: target/i686-pc-windows-msvc/release/mod_io.dll

  build-windows-debug-x64:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build Windows Debug x64
      run: cargo build --target x86_64-pc-windows-msvc

    - name: List files
      run: dir /s /b

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: windows-debug-x64
        path: target/x86_64-pc-windows-msvc/debug/mod_io.dll

  build-windows-debug-x86:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build Windows Debug x86
      run: cargo build --target i686-pc-windows-msvc

    - name: List files
      run: dir /s /b

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: windows-debug-x86
        path: target/i686-pc-windows-msvc/debug/mod_io.dll

  build-macos-release-x64:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build macOS Release x64
      run: cargo build --target x86_64-apple-darwin --release

    - name: List files
      run: ls -R

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: macos-release-x64
        path: target/x86_64-apple-darwin/release/libmod_io.dylib

  build-macos-release-x86:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable

    - name: Build macOS Release x86
      run: cargo build --target i686-apple-darwin --release

    - name: List files
      run: ls -R

    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: macos-release-x86
        path: target/i686-app